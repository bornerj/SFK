# index.toml — AI Context Router
# Read at the start of each session via kernel/BOOTSTRAP.md
# Defines what to load and when, avoiding unnecessary token reads.
# Complements (does not replace) kernel/BOOTSTRAP.md.

# -------------------------------------------------------
# LAYER 0 — Loaded in EVERY interaction
# -------------------------------------------------------

[always]
files = [
  "kernel/project.toml",  # identity, stack, URLs, design tokens
  "kernel/SOUL.md",       # AI behavior and restrictions
  "kernel/RULES.md",      # governance, process, and memory (sovereign)
]

# -------------------------------------------------------
# LAYER 1 — Loaded by task type
# The AI must identify the task type and load the corresponding files.
# -------------------------------------------------------

[on_onboarding]
# Trigger: session start, understand the project, current state, summary, where are we
trigger = "onboarding, understand the project, current state, where are we, catch me up, summary, overview"
read = [
  "memory/MODIFICATION_LOG.md",
  "memory/progress.md",
  "memory/plans/",
  "kernel/ARCHITECTURE.md",
  "kernel/SYSTEM.md",
]

[on_planning]
# Trigger: plan, create feature, new module, write spec
trigger = "create, plan, new module, new feature, architect, write spec, new route, new screen, new service"
read = [
  "memory/MODIFICATION_LOG.md",
  "memory/progress.md",
  "memory/decisions/",
  "memory/plans/",
  "kernel/ARCHITECTURE.md",
]
write = [
  "memory/plans/PLAN-XXXX-SUBJECT.md",
]

[on_implementation]
# Trigger: implement, code, develop, execute, finish, build
trigger = "implement, code, develop, execute, finish, build, write code, complete"
read = [
  "memory/MODIFICATION_LOG.md",
  "memory/progress.md",
  "memory/logs/DEBUG-HISTORY.md",
  "memory/plans/",
  "kernel/ARCHITECTURE.md",
  "kernel/SYSTEM.md",
]
write = [
  "memory/MODIFICATION_LOG.md",
  "memory/progress.md",
]

[on_bug]
# Trigger: bug, error, crash, not working, investigate, fix
trigger = "bug, error, exception, crash, not working, unexpected, investigate, fix, broken"
read = [
  "memory/logs/DEBUG-HISTORY.md",
  "memory/MODIFICATION_LOG.md",
  "memory/progress.md",
  "memory/plans/",
  "kernel/SYSTEM.md",
]
write = [
  "memory/logs/DEBUG-HISTORY.md",
  "memory/MODIFICATION_LOG.md",
]

[on_architecture]
# Trigger: architecture, system design, database, migration, restructure
trigger = "architecture, structure, system design, database, migration, schema, restructure, monorepo"
read = [
  "memory/decisions/",
  "memory/MODIFICATION_LOG.md",
  "memory/progress.md",
  "kernel/ARCHITECTURE.md",
  "kernel/SYSTEM.md",
]
write = [
  "memory/decisions/DECISION-XXX.md",
]

[on_refactor]
# Trigger: refactor, clean code, simplify, technical debt
trigger = "refactor, reorganize, clean code, simplify, decouple, technical debt, legacy, cleanup"
read = [
  "memory/progress.md",
  "memory/MODIFICATION_LOG.md",
  "memory/logs/DEBUG-HISTORY.md",
  "kernel/ARCHITECTURE.md",
]
write = [
  "memory/progress.md",
  "memory/MODIFICATION_LOG.md",
]

[on_security]
# Trigger: security, authentication, authorization, OWASP, vulnerability
trigger = "security, authentication, authorization, OWASP, pentest, token, secret, exposure, CORS, XSS, injection"
read = [
  "memory/logs/DEBUG-HISTORY.md",
  "memory/decisions/",
  "kernel/ARCHITECTURE.md",
]
write = [
  "memory/logs/DEBUG-HISTORY.md",
]

[on_testing]
# Trigger: tests, coverage, TDD, e2e, unit test
trigger = "test, tests, coverage, TDD, e2e, unit test, integration test, mock, QA, regression"
read = [
  "memory/progress.md",
  "memory/plans/",
  "kernel/ARCHITECTURE.md",
  "kernel/SYSTEM.md",
]
write = [
  "memory/progress.md",
]

[on_database]
# Trigger: migration, schema, query, database, alter table
trigger = "migration, schema, query, database, alter table, new column, index, seed, ORM, model"
read = [
  "memory/logs/DEBUG-HISTORY.md",
  "memory/decisions/",
  "kernel/SYSTEM.md",
]
write = [
  "memory/logs/DEBUG-HISTORY.md",
  "memory/progress.md",
]

[on_infra]
# Trigger: infra, deploy, docker, CI/CD, pipeline, cloud
trigger = "infra, deploy, docker, kubernetes, CI, pipeline, cloud, provision, terraform, serverless, monitoring"
read = [
  "memory/decisions/",
  "memory/logs/DEBUG-HISTORY.md",
  "kernel/ARCHITECTURE.md",
]
write = [
  "memory/decisions/DECISION-XXX.md",
  "memory/logs/DEBUG-HISTORY.md",
]

[on_dependency]
# Trigger: add library, new dependency, upgrade, migrate framework
trigger = "add library, new dependency, install, evaluate tool, remove dependency, upgrade, migrate"
read = [
  "memory/decisions/",
  "memory/logs/DEBUG-HISTORY.md",
  "kernel/project.toml",
]
write = [
  "memory/decisions/DECISION-XXX.md",
]

[on_release]
# Trigger: release, deploy, publish, version, changelog, go live
trigger = "release, deploy, publish, version, changelog, go live, tag, ship, rollback"
read = [
  "memory/MODIFICATION_LOG.md",
  "memory/progress.md",
  "memory/plans/",
  "memory/logs/DEBUG-HISTORY.md",
]
write = [
  "memory/MODIFICATION_LOG.md",
  "memory/progress.md",
]

[on_design_system]
# Trigger: design system, component, token, color, typography, theme
trigger = "design system, component, token, color, typography, theme, dark mode, style, UI, visual, animation, layout"
read = [
  "kernel/project.toml",   # design tokens
  "kernel/ARCHITECTURE.md",
  "memory/decisions/",
]

[on_documentation]
# Trigger: document, update README, API doc, tutorial
trigger = "document, update README, API doc, tutorial, changelog, JSDoc, Swagger, OpenAPI"
read = [
  "memory/progress.md",
  "memory/decisions/",
  "memory/plans/",
]
write = [
  "memory/progress.md",
]

# -------------------------------------------------------
# LAYER 2 — Context maintenance
# -------------------------------------------------------

[on_audit]
# Trigger: audit, session closure, check drift, verify session
trigger = "audit, session closure, close session, check drift, verify session, finish session"
read = [
  "memory/logs/SESSION-AUDIT-CHECKLIST.md",
  "memory/logs/DRIFT-RULES.md",
  "memory/MODIFICATION_LOG.md",
  "memory/progress.md",
]

[on_context_pruning]
# Trigger: context too large, compress memory, summarize progress
trigger = "context too large, compress memory, reduce tokens, summarize progress"
read = [
  "memory/MODIFICATION_LOG.md",
  "memory/progress.md",
  "memory/logs/DEBUG-HISTORY.md",
  "memory/decisions/",
]
write = [
  "memory/MODIFICATION_LOG.md",   # compress stable entries
  "memory/progress.md",            # consolidate state
]
